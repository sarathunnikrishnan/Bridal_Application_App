<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Success - Bridal E-Commerce</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body {
            background: url('https://example.com/background.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Arial, sans-serif';
            color: #fff;
        }
        .container {
            margin-top: 50px;
        }
        .card {
            background: rgba(0, 0, 0, 0.7);
            border: none;
        }
        .card-body {
            padding: 30px;
        }
        .btn-custom {
            background: #f8b400;
            border: none;
            color: #fff;
        }
        .btn-custom:hover {
            background: #ffa600;
        }
        .order-summary {
            background: rgba(255, 255, 255, 0.2);
            padding: 20px;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="container text-center">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-body">
                        <h1 class="card-title">Thank You for Your Purchase!</h1>
                        <p class="card-text">Your order has been successfully placed. We appreciate your business and hope you enjoy your new bridal items.</p>
                        <div class="order-summary my-4">
                            <h3>Order Summary</h3>
                            <p>Order Number: <strong>#123456</strong></p>
                            <p>Total Amount: <strong>$299.99</strong></p>
                        </div>
                        <a href="/" class="btn btn-custom btn-lg">Continue Shopping</a>
                        <a href="/order-history" class="btn btn-light btn-lg">View Order History</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
